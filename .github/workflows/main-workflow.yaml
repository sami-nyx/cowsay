on:
  workflow_dispatch:
    
  push:
    tags:
      - 'v*'
    
jobs:
  
  build-and-test:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write 
      contents: write 
    steps:
    
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t cowsay:${{ github.ref_name }} .

      - name: List images
        run: echo "$(docker images)"
      - name: Run container from the created image
        run: |
          docker run -d \
            --name cowsay \
            -p 80:8080 \
            cowsay:${{ github.ref_name }}
      
      - name: Wait for the application to be ready
        run: |
          echo "Waiting for cowsay to wake up on port 80..."
          for i in {1..10}; do
            # curl the host port (80) directly from the runner
            if curl -s http://localhost:80 > /dev/null; then
              echo "✅ Container is responding perfectly!"
              exit 0
            fi
            echo "Container starting up... sleeping 1s"
            sleep 1
          done
          echo "❌ Container failed to respond on time."
          docker logs cowsay
          exit 1

      - name: Test image
        run: echo $(curl localhost:80)
      - name: Calculate and Push Next Version Tag
        id: versioning
        run: |
          # 1. Find the latest tag. If no tags exist yet, default to v1.0.0
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "Current latest tag in repo: $LATEST_TAG"
          

          # 2. Extract the numbers (strips the 'v' first)
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          # 3. Calculate the next patch number safely in Bash
          NEXT_PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$NEXT_PATCH"
          echo "Calculated new tag: $NEW_TAG"
          
          # 4. Save the new tag to GITHUB_ENV so downstream steps can use it
          echo "IMAGE_TAG=$NEW_TAG" >> $GITHUB_ENV
          
          # 5. Securely push the new tag back to GitHub using the native bot profile
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::889867978066:role/github-actions-ecr-push-role
          aws-region: ap-south-1 
          disable-retry: true 

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: cowsay
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

        